name: v4.6 Core Consolidation

on:
  push:
    branches:
      - main
      - codex/v4.6-core-consolidation
    paths:
      - tools/consolidate-v46.mjs
      - _includes/uprs460-core-authority.html
      - _includes/uprs460-consolidation.html
      - .github/workflows/v46-consolidation.yml
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - app-v4.5.0.html
      - tools/consolidate-v46.mjs
      - _includes/uprs460-core-authority.html
      - _includes/uprs460-consolidation.html
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tested ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deterministic single-file v4.6 release
        shell: bash
        run: |
          set +e
          node tools/consolidate-v46.mjs > build-v46.log 2>&1
          code=$?
          cat build-v46.log
          exit $code

      - name: Verify generated artifact
        run: |
          test -s build/index.html
          test -s build/UPRS_v4.6.0_consolidation_report.json
          grep -q 'uprs460CoreAuthority' build/index.html
          grep -q 'uprs460Consolidation' build/index.html
          grep -q 'v4.6.0' build/index.html
          grep -q '__UPRS450__' build/index.html
          grep -q 'asml_euv_lpp' build/index.html

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UPRS-v4.6.0-build-diagnostics
          path: build-v46.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload standalone release candidate
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: UPRS-v4.6.0-release-candidate
          path: |
            build/index.html
            build/UPRS_v4.6.0_consolidation_report.json
          if-no-files-found: error
          retention-days: 14
